<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMTC Verification</title>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0e27;
      position: relative;
      overflow: auto;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float 20s infinite ease-in-out;
    }

    .orb1 {
      width: 400px;
      height: 400px;
      background: #ff6b35;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb2 {
      width: 350px;
      height: 350px;
      background: #f7931e;
      bottom: -100px;
      right: -100px;
      animation-delay: -10s;
    }

    .orb3 {
      width: 300px;
      height: 300px;
      background: #6a4c93;
      top: 50%;
      left: 50%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -50px) scale(1.1); }
      66% { transform: translate(-50px, 50px) scale(0.9); }
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-wrapper {
      display: inline-block;
      position: relative;
      margin-bottom: 24px;
    }

    .logo-circle {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 10px 40px rgba(255, 107, 53, 0.5);
      animation: pulse 3s ease-in-out infinite;
      position: relative;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(255, 107, 53, 0.5); }
      50% { transform: scale(1.05); box-shadow: 0 15px 50px rgba(255, 107, 53, 0.7); }
    }

    .logo-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 2px solid rgba(255, 107, 53, 0.3);
      border-radius: 50%;
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: -1px;
      text-shadow: 0 2px 20px rgba(255, 255, 255, 0.2);
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
    }

    .info-banner {
      background: rgba(106, 76, 147, 0.2);
      border: 1px solid rgba(106, 76, 147, 0.4);
      border-radius: 16px;
      padding: 16px;
      margin: 32px 0;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .info-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .info-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      line-height: 1.6;
    }

    .scan-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
      font-family: 'Outfit', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .scan-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .scan-btn:hover::before {
      left: 100%;
    }

    .scan-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6);
    }

    .scan-btn:active {
      transform: translateY(0);
    }

    .scan-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .scan-btn:disabled:hover {
      transform: none;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
    }

    .btn-icon {
      font-size: 24px;
    }

    .result {
      margin-top: 32px;
    }

    .loading-state {
      text-align: center;
      padding: 40px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      font-weight: 500;
    }

    .success-box {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 20px;
      padding: 32px;
      animation: successSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes successSlide {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .check-icon {
      width: 32px;
      height: 32px;
      background: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .success-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
    }

    .otp-box {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin: 20px 0;
    }

    .otp-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .otp-value {
      color: #ffffff;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 10px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 2px 10px rgba(255, 107, 53, 0.5);
    }

    .ticket-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
    }

    .ticket-header {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ticket-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ticket-item:last-child {
      border-bottom: none;
    }

    .ticket-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-weight: 500;
    }

    .ticket-value {
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-text {
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 20px;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 28px;
      }

      h1 {
        font-size: 30px;
      }

      .otp-value {
        font-size: 36px;
        letter-spacing: 8px;
      }

      .logo-circle {
        width: 80px;
        height: 80px;
        font-size: 40px;
      }
    }
  </style>
 </head>
 <body>
  <div class="bg-animation">
   <div class="orb orb1"></div>
   <div class="orb orb2"></div>
   <div class="orb orb3"></div>
  </div>
  <div class="container">
   <div class="card">
    <div class="logo-section">
     <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <div class="logo-circle">
       🚍
      </div>
     </div>
     <h1>BMTC Adarsh Card</h1>
     <p class="subtitle">Smart verification for modern travel</p>
    </div>
    <div class="info-banner"><span class="info-icon">💳</span>
     <p class="info-text">Tap your Adarsh card or click below to instantly verify and get your boarding pass</p>
    </div><button class="scan-btn" id="scanButton" onclick="sendOTP()"> <span class="btn-icon">⚡</span> <span id="scan-button-text">Verify Now</span> </button>
    <div class="result" id="result"></div>
    <center>
     <div class="badge"><span>🔒</span> <span>Official BMTC System</span>
     </div>
    </center>
   </div>
  </div>
  <script>
    function sendOTP() {
      const button = document.getElementById('scanButton');
      const resultDiv = document.getElementById('result');
      
      button.disabled = true;
      resultDiv.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <div class="loading-text">Verifying card...</div>
        </div>
      `;

      fetch("/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          scan: "QR_SCANNED"
        })
      })
      .then(res => res.json())
      .then(data => {
        button.disabled = false;
        
        if (!data.ticket) {
          resultDiv.innerHTML = `
            <div class="error-box">
              <div class="error-icon">⚠️</div>
              <div class="error-text">Unable to retrieve ticket data. Please try again.</div>
            </div>
          `;
          return;
        }
        
        resultDiv.innerHTML = `
          <div class="success-box">
            <div class="success-header">
              <div class="check-icon">✓</div>
              <div class="success-title">${data.message || 'Verified Successfully'}</div>
            </div>
            
            <div class="otp-box">
              <div class="otp-label">Your OTP</div>
              <div class="otp-value">${data.otp || '0000'}</div>
            </div>

            <div class="ticket-box">
              <div class="ticket-header">
                <span>🎫</span>
                <span>Ticket Details</span>
              </div>
              <div class="ticket-item">
                <span class="ticket-label">Bus Number</span>
                <span class="ticket-value">${data.ticket.busNo || 'N/A'}</span>
              </div>
              <div class="ticket-item">
                <span class="ticket-label">Time</span>
                <span class="ticket-value">${data.ticket.time || 'N/A'}</span>
              </div>
              <div class="ticket-item">
                <span class="ticket-label">Fare</span>
                <span class="ticket-value">${data.ticket.fare || 'N/A'}</span>
              </div>
            </div>
          </div>
        `;
      })
      .catch(err => {
        button.disabled = false;
        resultDiv.innerHTML = `
          <div class="error-box">
            <div class="error-icon">⚠️</div>
            <div class="error-text">Connection error. Please check your connection and try again.</div>
          </div>
        `;
        console.error('Verification error:', err);
      });
    }
  </script>
 </body>
</html>
